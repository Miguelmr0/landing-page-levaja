<!DOCTYPE html>
<html lang="pt-br">

<head>

    <!-- Início da configuração da página -->

    <!-- Conexão com o arquivo CSS responsável pela aparência da página -->
    <link rel="stylesheet" href="../css/style.css">

    <!-- Faz com que a página se adapte melhor a diferentes tamanhos de tela -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>LevaJá - Cadastro</title>

    <!-- Fim da configuração da página -->

</head>

<body>

    <!-- Início do cabeçalho principal -->

    <!-- Cabeçalho principal da página com o nome da plataforma e uma breve mensagem -->

    <header class="topo">

        <h1 class="logo">LevaJá</h1>

        <p class="subtitulo">
            Preencha o formulário e comece a trabalhar com a gente.
        </p>

    </header>

    <!-- Fim do cabeçalho principal -->


    <!-- Início da área de cadastro -->

    <!-- Área destinada ao cadastro de novos entregadores -->

    <section class="formulario">

        <h2>Cadastre-se</h2>

        <!-- Início do formulário -->

        <form>

            <!-- Início do campo nome -->

            <label for="nome">Nome:</label>
            <br>
            <input type="text" id="nome" placeholder="Seu nome completo">
            <br><br>

            <!-- Fim do campo nome -->


            <!-- Início do campo telefone -->

            <label for="telefone">Telefone:</label>
            <br>
            <input type="tel" id="telefone" placeholder="(00) 00000-0000">
            <br><br>

            <!-- Fim do campo telefone -->


            <!-- Início do campo e-mail -->

            <label for="email">E-mail:</label>
            <br>
            <input type="email" id="email" placeholder="seu@email.com">
            <br><br>

            <!-- Fim do campo e-mail -->


            <!-- Início do botão de envio -->

            <!-- Botão responsável pelo envio do formulário -->

            <input type="submit" value="Enviar">

            <!-- Fim do botão de envio -->

        </form>

        <!-- Fim do formulário -->


        <!-- Início do link de retorno -->

        <p>
            <a href="index.html" class="link-rodape">Voltar para o início</a>
        </p>

        <!-- Fim do link de retorno -->

    </section>

    <!-- Fim da área de cadastro -->

</body>

</html>
